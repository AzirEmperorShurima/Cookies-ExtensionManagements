<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Mode - Focus Sounds</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/popup.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a29bfe;
            --accent-hover: #8e83f7;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
        }
        
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0f121b, #1a1e2e, #2d2447) !important;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh !important;
            width: 100vw !important;
            max-width: none !important;
            padding: 0 !important;
            margin: 0;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        /* Subtle animated background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::before {
            background: rgba(162, 155, 254, 0.15);
            top: -100px;
            left: -100px;
        }
        body::after {
            background: rgba(0, 206, 201, 0.1);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 92%;
            max-width: 1200px;
            height: 88vh;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 {
            background: linear-gradient(to right, #00cec9, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 38px;
            font-weight: 600;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 300;
        }
        
        .main-layout {
            display: flex;
            gap: 30px;
            flex: 1;
            min-height: 0;
        }

        /* Left Panel - Playlists */
        .left-panel {
            flex: 0 0 320px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
            padding-right: 15px;
        }
        .left-panel::-webkit-scrollbar { width: 6px; }
        .left-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 6px; }
        .left-panel::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--glass-border), transparent);
        }

        .playlist-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .playlist-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }
        .playlist-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.3s ease;
            transform-origin: center;
        }
        .playlist-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(5px);
        }
        .playlist-card.active {
            background: rgba(162, 155, 254, 0.1);
            border-color: rgba(162, 155, 254, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .playlist-card.active::before {
            transform: scaleY(1);
        }
        .card-icon {
            font-size: 24px;
            background: rgba(255,255,255,0.05);
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .playlist-card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }
        .playlist-card.active .card-icon {
            background: var(--accent);
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .card-title {
            font-weight: 400;
            font-size: 15px;
            color: var(--text-main);
        }

        /* Custom Playlist Manager */
        .custom-manager {
            background: rgba(0,0,0,0.15);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--glass-border);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }
        .input-group input {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
            color: white;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(162, 155, 254, 0.2);
        }
        .input-group button {
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }
        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.6);
        }
        .input-group button:active {
            transform: translateY(1px);
        }

        .create-playlist-btn {
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2);
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .create-playlist-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        .new-playlist-form {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }
        .new-playlist-form input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        .new-playlist-form input:focus { border-color: var(--accent); }
        .new-playlist-form button {
            padding: 8px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .custom-playlists-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .user-playlist-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
        }
        .user-playlist-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: background 0.3s;
        }
        .user-playlist-header:hover { background: rgba(255,255,255,0.06); }
        .user-playlist-title {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-playlist-actions {
            display: flex;
            gap: 8px;
        }
        .play-pl-btn {
            background: rgba(0, 206, 201, 0.2);
            color: #00cec9;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        .play-pl-btn:hover { background: #00cec9; color: white; }
        .del-pl-btn {
            background: rgba(253, 121, 168, 0.2);
            color: #fd79a8;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        .del-pl-btn:hover { background: #fd79a8; color: white; }

        .user-playlist-body {
            display: none;
            padding: 15px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.1);
        }
        .user-playlist-card.expanded .user-playlist-body {
            display: block;
        }
        
        .add-track-form {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .add-track-form input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 12px;
            outline: none;
        }
        .add-track-form button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .custom-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .custom-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        .custom-item:hover {
            background: rgba(255,255,255,0.07);
        }
        .custom-item.active {
            background: rgba(162, 155, 254, 0.15);
            border-color: rgba(162, 155, 254, 0.4);
        }
        .custom-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
            font-weight: 400;
        }
        .delete-btn {
            background: rgba(255, 118, 117, 0.1);
            border: none;
            color: #ff7675;
            cursor: pointer;
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #ff7675;
            color: white;
        }

        /* Right Panel - Player */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .now-playing-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .status-badge {
            background: rgba(0, 206, 201, 0.15);
            color: #00cec9;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(0, 206, 201, 0.3);
        }
        
        .status-badge.playing::before {
            content: '';
            width: 8px; height: 8px;
            background: #00cec9;
            border-radius: 50%;
            box-shadow: 0 0 10px #00cec9;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 206, 201, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(0, 206, 201, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 206, 201, 0); }
        }

        .right-panel {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 0;
            position: relative;
        }
        
        .player-visualizer {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-text-wrap {
            margin: 25px 0 20px 0;
            text-align: center;
        }
        #statusText {
            color: var(--text-main);
            font-size: 18px;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls-glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            flex-shrink: 0;
        }
        
        .playback-btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        .play-btn {
            background: linear-gradient(135deg, #00cec9, #0984e3);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 206, 201, 0.4);
            padding-left: 4px; /* visually center play icon */
        }
        .play-btn.paused-state {
            padding-left: 0; /* center pause icon */
        }
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 206, 201, 0.6);
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .volume-control span {
            font-size: 16px;
            color: var(--text-muted);
        }
        .volume-control input[type=range] {
            width: 120px;
            -webkit-appearance: none;
            background: transparent;
        }
        .volume-control input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(162, 155, 254, 0.5);
        }
        .volume-control input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        
        /* Audio visualizer effect for HTML5 */
        .audio-wave {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 100%;
            background: linear-gradient(to bottom, #111, #1a1a2e);
        }
        .audio-wave .bar {
            width: 8px;
            background: var(--accent);
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite alternate;
        }
        .audio-wave .bar:nth-child(2) { animation-delay: 0.1s; background: #00cec9; }
        .audio-wave .bar:nth-child(3) { animation-delay: 0.2s; background: #fd79a8; }
        .audio-wave .bar:nth-child(4) { animation-delay: 0.3s; background: #00cec9; }
        .audio-wave .bar:nth-child(5) { animation-delay: 0.4s; background: var(--accent); }
        
        @keyframes wave {
            0% { height: 10px; }
            100% { height: 100px; }
        }

        /* Responsive Media Queries */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
                overflow-y: auto;
            }
            .left-panel {
                flex: none;
                width: 100%;
                overflow: visible;
                padding-right: 0;
            }
            .right-panel {
                flex: none;
                height: 500px;
                margin-top: 20px;
            }
            .container {
                height: 95vh;
                padding: 20px;
                overflow-y: hidden; /* container handles main-layout scroll */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Zen Mode</h1>
            <div class="subtitle">Focus your mind with ambient soundscapes</div>
        </div>
        
        <div class="main-layout">
            <!-- Left: Playlists -->
            <div class="left-panel">
                <div class="section-title">Soundscapes</div>
                <div class="playlist-grid">
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fuser-908929543%2Fthunderstorm-soundslong-recording-relaxing-rain-thunder-sounds-for-sleep-insomnia-or-study&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">🌧️</div>
                        <div class="card-title">Rain Sounds</div>
                    </div>
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fnigeldelviero%2Fchill-study-beats-lofi-hip-hop-mix-2018&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">🎧</div>
                        <div class="card-title">Lofi Chill</div>
                    </div>
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Frelaxing-white-noise%2Frain-sounds-for-sleep-ocean-waves&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">🌊</div>
                        <div class="card-title">Ocean Waves</div>
                    </div>
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Frandomlymixes%2Frainy-and-fireplace-jazz-cozy-ambience-music-for-reading-chilling-and-relaxing&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">🔥</div>
                        <div class="card-title">Cozy Fireplace</div>
                    </div>
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Fgrant-lewers-185714392%2Fcafe-leblanc-coffee-shop-ambience-smooth-jazz-persona-music-rain-to-study-relax-sleep&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">☕</div>
                        <div class="card-title">Cafe Ambience</div>
                    </div>
                    <div class="playlist-card" data-url="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Frelaxing-white-noise%2Fbaby-sleep-white-noise-5-hours&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=true">
                        <div class="card-icon">🎵</div>
                        <div class="card-title">White Noise</div>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <span>Your Playlists</span>
                    <a href="https://soundcloud.com/search" target="_blank" style="font-size: 12px; color: var(--accent); text-decoration: none; font-weight: normal; letter-spacing: 0; text-transform: none; display: flex; align-items: center; gap: 5px;">
                        <span>🔍</span> Search SoundCloud
                    </a>
                </div>
                <div class="custom-manager">
                    <button id="createNewPlaylistBtn" class="create-playlist-btn">
                        <span>➕</span> Create New Playlist
                    </button>
                    
                    <div id="newPlaylistForm" class="new-playlist-form" style="display: none;">
                        <input type="text" id="newPlaylistName" placeholder="Playlist Name (e.g. Synthwave)">
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button id="cancelNewPlaylistBtn" style="background: rgba(255,255,255,0.1); flex: 1;">Cancel</button>
                            <button id="saveNewPlaylistBtn" style="background: var(--accent); flex: 1;">Create</button>
                        </div>
                    </div>

                    <div id="customPlaylistsContainer" class="custom-playlists-container">
                        <!-- Custom playlists injected via JS -->
                    </div>
                </div>
            </div>

            <!-- Right: Player -->
            <div class="right-panel">
                <div class="now-playing-header">
                    <div class="section-title" style="margin: 0;">Now Playing</div>
                    <div class="status-badge" id="playerStatusBadge">Ready</div>
                </div>
                
                <div id="player-container">
                    <div class="player-visualizer">
                        <iframe id="sc-widget" style="display:none; width: 100%; height: 100%; border: none;" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&amp;auto_play=false&amp;hide_related=true&amp;show_comments=false&amp;show_user=false&amp;show_reposts=false&amp;visual=true"></iframe>
                        
                        <div id="html5-audio-container" class="audio-wave">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <audio id="html5-audio" style="display: none;"></audio>
                        </div>
                    </div>
                </div>

                <div class="status-text-wrap">
                    <div id="statusText">Select a soundscape to begin</div>
                </div>

                <div class="controls-glass">
                    <div class="playback-btns">
                        <button class="nav-btn" id="prevBtn" title="Previous">⏮</button>
                        <button class="play-btn" id="playPauseBtn" title="Play/Pause">▶</button>
                        <button class="nav-btn" id="nextBtn" title="Next">⏭</button>
                    </div>
                    
                    <div class="volume-control">
                        <span>🔈</span>
                        <input type="range" id="volumeSlider" min="0" max="100" value="50">
                        <span>🔊</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- SoundCloud API Local -->
    <script src="soundcloud_api.js"></script>
    <!-- Playlist logic -->
    <script src="playlist.js"></script>
</body>
</html>
